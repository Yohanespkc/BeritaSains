name: Daily News Scraper

on:
  schedule:
    # Runs at 00:00 UTC (07:00 WIB) every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write # Needed to commit and push changes back to the repository

jobs:
  scrape-and-summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # cache pip dependencies for faster runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Scraper Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/scrape_and_summarize.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/news.json
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to news database."
          else
            git commit -m "chore: update daily science and tech news [skip ci]"
            git push origin main
          fi
