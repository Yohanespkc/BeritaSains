name: Daily News Scraper

on:
  schedule:
    # Berjalan otomatis setiap pukul 07:00 WIB (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Memungkinkan kita menjalankan manual kapan saja

permissions:
  contents: write

jobs:
  scrape-and-summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Scraper Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/scrape_and_summarize.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/news.json
          if git diff --staged --quiet; then
            echo "Tidak ada berita baru."
          else
            git commit -m "chore: update daily science and tech news [skip ci]"
            git push origin main
          fi
